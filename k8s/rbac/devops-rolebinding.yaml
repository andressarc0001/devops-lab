apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: devops
    namespace: default
roleRef:
  kind: Role
  name: devops-role
  apiGroup: rbac.authorization.k8s.io
